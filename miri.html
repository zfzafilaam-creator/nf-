<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A Special Message</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Caveat&display=swap" rel="stylesheet">
    <style>
        :root {
            --env-main: #f06292;
            --env-dark: #d81b60;
            --paper-color: #fffef2;
        }

        * {
            -webkit-tap-highlight-color: transparent; /* Removes blue box on mobile tap */
        }

        body {
            background-color: #fce4ec;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            perspective: 1500px;
            font-family: 'Caveat', cursive;
        }

        /* Floating Background */
        .bg-element {
            position: absolute;
            bottom: -50px;
            font-size: 2rem;
            opacity: 0.3;
            animation: float 12s linear infinite;
            z-index: 0;
            user-select: none;
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            20% { opacity: 0.3; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }

        .container {
            position: relative;
            width: 340px;
            height: 220px;
            cursor: pointer;
            z-index: 10;
            transition: transform 0.3s ease;
        }

        .envelope-back {
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--env-dark);
            border-radius: 8px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            z-index: 1;
        }

        /* THE LETTER */
        .letter {
            position: absolute;
            bottom: 5px;
            left: 15px;
            width: 310px;
            height: 200px;
            background: var(--paper-color);
            z-index: 2;
            padding: 30px;
            box-sizing: border-box;
            opacity: 0;
            /* Torn edge look */
            clip-path: polygon(0% 0%, 5% 2%, 10% 0%, 15% 2%, 20% 0%, 25% 2%, 30% 0%, 35% 2%, 40% 0%, 45% 2%, 50% 0%, 55% 2%, 60% 0%, 65% 2%, 70% 0%, 75% 2%, 80% 0%, 85% 2%, 90% 0%, 95% 2%, 100% 0%, 100% 100%, 0% 100%);
            transition: opacity 0.4s ease 0.6s, transform 1s cubic-bezier(0.175, 0.885, 0.32, 1.15) 0.7s;
            transform: translateY(0) scale(0.9);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.02);
        }

        .letter::before {
            content: "";
            position: absolute;
            top: 35%; left: 0; width: 100%; height: 1px;
            background: rgba(0,0,0,0.05);
            box-shadow: 0 65px 0 rgba(0,0,0,0.05);
        }

        .letter-content {
            text-align: center;
            opacity: 0;
            transition: opacity 0.8s ease 1.3s;
        }

        .letter-content h2 {
            font-family: 'Dancing Script', cursive;
            color: var(--env-dark);
            margin: 0 0 15px 0;
            font-size: 1.8rem;
        }

        .letter-content p {
            font-size: 1.4rem;
            line-height: 1.3;
            color: #333;
            margin: 0;
        }

        .envelope-front {
            position: absolute;
            bottom: 0;
            width: 0;
            height: 0;
            border-left: 170px solid transparent;
            border-right: 170px solid transparent;
            border-bottom: 120px solid var(--env-main);
            z-index: 4;
            border-radius: 0 0 8px 8px;
        }

        .envelope-front::after {
            content: "";
            position: absolute;
            bottom: -120px;
            left: -170px;
            border-left: 170px solid var(--env-main);
            border-right: 170px solid var(--env-main);
            border-top: 110px solid transparent;
        }

        .flap {
            position: absolute;
            top: 0;
            width: 0;
            height: 0;
            border-left: 170px solid transparent;
            border-right: 170px solid transparent;
            border-top: 130px solid var(--env-main);
            transform-origin: top;
            transition: transform 0.6s ease-in-out;
            z-index: 5;
        }

        .heart {
            position: absolute;
            top: 100px;
            left: 155px;
            width: 30px;
            height: 30px;
            background: #ff1744;
            transform: rotate(45deg);
            z-index: 6;
            animation: beat 1.5s infinite;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .heart::before, .heart::after {
            content: ""; position: absolute; width: 30px; height: 30px; background: #ff1744; border-radius: 50%;
        }
        .heart::before { left: -15px; }
        .heart::after { top: -15px; }

        @keyframes beat {
            0%, 100% { transform: rotate(45deg) scale(1); }
            50% { transform: rotate(45deg) scale(1.15); }
        }

        /* OPEN STATE */
        .container.open .flap {
            transform: rotateX(180deg);
            z-index: 1;
        }

        .container.open .letter {
            opacity: 1;
            transform: translateY(-155px);
            height: 300px;
        }

        .container.open .letter-content { opacity: 1; }
        .container.open .heart { display: none; }
    </style>
</head>
<body>
    <script>
        const symbols = ['🎂', '💖', '🐥', '💗', '✨'];
        for (let i = 0; i < 100; i++) {
            let el = document.createElement('div');
            el.className = 'bg-element';
            el.innerHTML = symbols[Math.floor(Math.random() * symbols.length)];
            el.style.left = Math.random() * 100 + 'vw';
            el.style.animationDelay = Math.random() * 10 + 's';
            document.body.appendChild(el);
        }
    </script>

    <div class="container" onclick="this.classList.toggle('open')">
        <div class="flap"></div>
        <div class="heart"></div>
        <div class="envelope-back"></div>
        <div class="letter">
            <div class="letter-content">
                <h2>Happy Birthday MIRIIIIIIIIII!</h2>
                <p>HAPPY BIRTHDAY MIRI I HOPE YOU LIVE LIFE U DREAM AND I WANT TO TELL YOU I LOVE SO MUCH BSTIE.</p>
            </div>
        </div>
        <div class="envelope-front"></div>
    </div><body style="background-image: url('miri/pppp.png'); background-size: cover; background-position: center;">

</body>
</html>
